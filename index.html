<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾張旭魅力発信ブログ｜EXE配布中</title>
    <style>
        :root { --main-color: #e63946; --bg-color: #f1faee; --text-color: #1d3557; }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding-bottom: 80px; 
            /* あさぴー背景固定 */
            background-image: url('https://cdn.discordapp.com/attachments/1497939794414796948/1498239305129136179/asapi-2.png?ex=69f06f96&is=69ef1e16&hm=1ca9fbe39d4e9945c262b793d47bc78b0e26466413fa546e6830178f217a68cf&');
            background-repeat: no-repeat; background-position: center; background-attachment: fixed; background-size: 70%; z-index: -1;
        }

        header { background: var(--main-color); color: white; padding: 1.5rem; text-align: center; position: relative; z-index: 10; }
        
        /* 📁 ヘッダーのZIP配布エリア */
        .dl-section { background: #1d3557; color: white; padding: 15px; text-align: center; }
        .dl-btn { 
            display: inline-block; background: #ffca28; color: #1d3557 !important; 
            padding: 10px 20px; border-radius: 30px; text-decoration: none !important; 
            font-weight: bold; font-size: 1rem; box-shadow: 0 4px 0 #b7950b; transition: 0.2s;
        }
        .dl-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0 #b7950b; }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; position: relative; z-index: 5; }
        .post { background: rgba(255, 255, 255, 0.85); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; cursor: pointer; }
        .post h2 { margin: 5px 0; color: var(--main-color); }

        /* モーダル関連 */
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .detail-content { background: white; width: 95%; max-width: 700px; max-height: 90vh; border-radius: 20px; padding: 25px; overflow-y: auto; }
        
        /* コメント欄 */
        .comment-card { background: #f8f9fa; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .reaction-bar { display: flex; gap: 15px; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        
        #post-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--main-color); color: white; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<header>
    <h1>尾張旭魅力発信ブログ</h1>
    <p>〜 尾張旭を有名にしたい一般人 〜</p>
</header>

<div class="dl-section">
    <p style="margin: 0 0 10px 0; font-size: 0.9rem; font-weight: bold;">🚀 Windows版アプリ 配布中！</p>
    <a href="https://cdn.discordapp.com/attachments/1498234296983617627/1498235945022128309/owariasahi.miryoku-win32-x64.zip?ex=69f06c75&is=69ef1af5&hm=dd78c138cc6ff8c18a3caa804a4f814edd8375debf1d58101de6cfa00b8e60e0&" class="dl-btn">
        📁 EXE版をダウンロード (.zip)
    </a>
</div>

<main class="container" id="blog-posts">読み込み中...</main>

<div id="detail-modal" onclick="closeDetail(event)">
    <div class="detail-content" onclick="event.stopPropagation()">
        <span onclick="document.getElementById('detail-modal').style.display='none'" style="float:right; cursor:pointer; font-size:2rem;">&times;</span>
        <div id="detail-body"></div>
        <hr>
        <h3>💬 コメント欄</h3>
        <div id="comments-display"></div>
        <div style="background:#eee; padding:15px; border-radius:10px; margin-top:10px;">
            <input type="text" id="com-user" placeholder="名前" style="width:45%;">
            <input type="password" id="com-pw" placeholder="削除キー" style="width:45%;">
            <textarea id="com-text" placeholder="コメント内容" style="width:100%; margin-top:10px;"></textarea>
            <button id="submit-comment" style="width:100%; padding:10px; background:var(--main-color); color:white; border:none; border-radius:5px; margin-top:10px; cursor:pointer;">投稿</button>
        </div>
    </div>
</div>

<button id="post-btn">🖊️</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp, where, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAttvrhbeton37WOWTcBQqUhcqdep0oVFs",
        authDomain: "owariasahi-yuumei-burogu.firebaseapp.com",
        projectId: "owariasahi-yuumei-burogu",
        storageBucket: "owariasahi-yuumei-burogu.firebasestorage.app",
        messagingSenderId: "486043897492",
        appId: "1:486043897492:web:e0b8e3263db278bde12e81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let currentPostId = null;

    onAuthStateChanged(auth, (u) => { currentUser = u; renderPosts(); });

    function renderPosts() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('blog-posts');
            container.innerHTML = '';
            snapshot.forEach(fbDoc => {
                const p = fbDoc.data();
                container.insertAdjacentHTML('beforeend', `
                    <article class="post" onclick="showDetail('${fbDoc.id}', '${p.title}', \`${p.content}\`)">
                        <h2>${p.title}</h2>
                        <p style="color:#666;">${p.content.substring(0, 40).replace(/<br>/g, ' ')}...</p>
                    </article>`);
            });
        });
    }

    window.showDetail = (id, title, body) => {
        currentPostId = id;
        document.getElementById('detail-body').innerHTML = `<h1>${title}</h1><p>${body}</p>`;
        document.getElementById('detail-modal').style.display = 'flex';
        loadComments(id);
    };

    function loadComments(postId) {
        const q = query(collection(db, "comments"), where("postId", "==", postId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('comments-display');
            list.innerHTML = '';
            snapshot.forEach(d => {
                const c = d.data();
                list.insertAdjacentHTML('beforeend', `
                    <div class="comment-card">
                        <strong>${c.user}</strong>：${c.text}
                        <div class="reaction-bar">
                            <span style="cursor:pointer" onclick="react('${d.id}', 'good')">👍 ${c.good||0}</span>
                            <span style="cursor:pointer" onclick="react('${d.id}', 'bad')">👎 ${c.bad||0}</span>
                            <span style="color:red; font-size:0.7rem; cursor:pointer;" onclick="delCom('${d.id}', '${c.pw}')">削除</span>
                        </div>
                    </div>`);
            });
        });
    }

    document.getElementById('submit-comment').onclick = async () => {
        const user = document.getElementById('com-user').value || "匿名";
        const pw = document.getElementById('com-pw').value;
        const text = document.getElementById('com-text').value;
        if(!text || !pw) return alert("入力してね");
        await addDoc(collection(db, "comments"), { postId: currentPostId, user, pw, text, good:0, bad:0, timestamp: serverTimestamp() });
        document.getElementById('com-text').value = "";
    };

    window.react = async (id, type) => { await updateDoc(doc(db, "comments", id), { [type]: increment(1) }); };
    window.delCom = async (id, correct) => {
        if(currentUser || prompt("削除キー") === correct) await deleteDoc(doc(db, "comments", id));
        else alert("失敗");
    };
    window.closeDetail = (e) => { if(e.target.id === 'detail-modal') document.getElementById('detail-modal').style.display = 'none'; };
    document.getElementById('post-btn').onclick = () => alert("管理者ページから投稿してね！");
</script>
</body>
</html>
