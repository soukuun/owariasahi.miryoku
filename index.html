<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾張旭魅力発信ブログ｜公式あさぴー背景版</title>
    <style>
        :root { --main-color: #e63946; --bg-color: #f1faee; --text-color: #1d3557; }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding-bottom: 80px; 
            /* ⬇️ あさぴー背景（嘉発さん指定URL固定） ⬇️ */
            background-image: url('https://cdn.discordapp.com/attachments/1497939794414796948/1498239305129136179/asapi-2.png?ex=69f06f96&is=69ef1e16&hm=1ca9fbe39d4e9945c262b793d47bc78b0e26466413fa546e6830178f217a68cf&');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: 70%;
            z-index: -1;
        }

        header { background: var(--main-color); color: white; padding: 1.5rem; text-align: center; position: relative; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; position: relative; z-index: 5; }

        .post { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
        }
        .post:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.95); }

        /* 📱 記事詳細 ＆ コメントモーダル */
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .detail-content { background: rgba(255, 255, 255, 0.98); width: 95%; max-width: 700px; max-height: 90vh; border-radius: 20px; padding: 25px; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close-detail { position: sticky; top: 0; float: right; font-size: 2.5rem; cursor: pointer; color: #888; line-height: 1; z-index: 100; }

        /* コメント欄のデザイン */
        .comment-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .comment-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .comment-card.pinned { border: 2px solid #ffca28; background: #fffef0; }
        .comment-meta { font-size: 0.8rem; color: #777; margin-bottom: 8px; }
        .reaction-bar { display: flex; gap: 20px; margin-top: 12px; font-weight: bold; }
        .react-btn { cursor: pointer; transition: 0.2s; }
        .react-btn:active { transform: scale(1.2); }

        .comment-form { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .comment-form .row { display: flex; gap: 10px; }
        
        #post-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--main-color); color: white; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(230,57,70,0.4); }
        .zip-download-link { display: inline-block; background: #1d3557; color: white !important; padding: 12px 24px; border-radius: 10px; text-decoration: none; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <h1>尾張旭魅力発信ブログ</h1>
    <p>〜 尾張旭を有名にしたい一般人 〜</p>
</header>

<main class="container" id="blog-posts">あさぴーが読み込み中...</main>

<div id="detail-modal" onclick="closeDetail(event)">
    <div class="detail-content" onclick="event.stopPropagation()">
        <span class="close-detail" onclick="document.getElementById('detail-modal').style.display='none'">&times;</span>
        <div id="detail-body"></div>
        
        <div class="comment-section">
            <h3>💬 みんなのコメント</h3>
            <div id="comments-display"></div>
            
            <div class="comment-form">
                <div class="row">
                    <input type="text" id="com-user" placeholder="名前">
                    <input type="password" id="com-pw" placeholder="削除用パスワード">
                </div>
                <textarea id="com-text" placeholder="コメントを書こう！" rows="3"></textarea>
                <button id="submit-comment" style="width:100%; background:var(--main-color); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">投稿する</button>
            </div>
        </div>
    </div>
</div>

<button id="post-btn">🖊️</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp, where, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAttvrhbeton37WOWTcBQqUhcqdep0oVFs",
        authDomain: "owariasahi-yuumei-burogu.firebaseapp.com",
        projectId: "owariasahi-yuumei-burogu",
        storageBucket: "owariasahi-yuumei-burogu.firebasestorage.app",
        messagingSenderId: "486043897492",
        appId: "1:486043897492:web:e0b8e3263db278bde12e81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let currentUser = null;
    let currentPostId = null;

    onAuthStateChanged(auth, (user) => { currentUser = user; renderPosts(); });

    function formatBody(text) {
        let body = text;
        body = body.replace(/(https?:\/\/[\w\/:%#\$&\?\(\)~\.=\+\-]+(\.jpg|\.png|\.gif|\.jpeg|\.webp)[\w\/:%#\$&\?\(\)~\.=\+\-]*)/gi, '<img src="$1" style="max-width:100%; border-radius:10px; margin:15px 0; display:block;">');
        body = body.replace(/(https?:\/\/[\w\/:%#\$&\?\(\)~\.=\+\-]+(\.zip)[\w\/:%#\$&\?\(\)~\.=\+\-]*)/gi, '<div><a href="$1" class="zip-download-link">📁 配布ファイルをダウンロード</a></div>');
        return body;
    }

    function renderPosts() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('blog-posts');
            container.innerHTML = '';
            snapshot.forEach((fbDoc) => {
                const p = fbDoc.data();
                container.insertAdjacentHTML('beforeend', `
                    <article class="post" onclick="showDetail('${fbDoc.id}', '${p.title}', \`${formatBody(p.content).replace(/`/g, '\\`')}\`)">
                        <h2>${p.title}</h2>
                        <p style="color:#666; font-size:0.9rem;">${p.content.substring(0, 50).replace(/<br>/g, ' ')}...</p>
                    </article>`);
            });
        });
    }

    window.showDetail = (id, title, body) => {
        currentPostId = id;
        document.getElementById('detail-body').innerHTML = `<h1 style="color:var(--main-color);">${title}</h1><div style="line-height:1.7;">${body}</div>`;
        document.getElementById('detail-modal').style.display = 'flex';
        loadComments(id);
    };

    function loadComments(postId) {
        const q = query(collection(db, "comments"), where("postId", "==", postId), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('comments-display');
            list.innerHTML = '';
            let items = [];
            snapshot.forEach(d => items.push({id: d.id, ...d.data()}));
            items.sort((a,b) => (b.pinned||0) - (a.pinned||0));

            items.forEach(c => {
                list.insertAdjacentHTML('beforeend', `
                    <div class="comment-card ${c.pinned ? 'pinned' : ''}">
                        <div class="comment-meta"><strong>${c.user}</strong> ・ ${c.timestamp ? new Date(c.timestamp.toDate()).toLocaleString() : ''} ${c.pinned ? '📌' : ''}</div>
                        <div>${c.text}</div>
                        <div class="reaction-bar">
                            <span class="react-btn" onclick="react('${c.id}', 'good')">👍 ${c.good || 0}</span>
                            <span class="react-btn" onclick="react('${c.id}', 'bad')">👎 ${c.bad || 0}</span>
                            <span style="color:#e63946; font-size:0.7rem; cursor:pointer;" onclick="deleteComment('${c.id}', '${c.pw}')">削除</span>
                            ${currentUser ? `<span style="color:orange; font-size:0.7rem; cursor:pointer;" onclick="togglePin('${c.id}', ${c.pinned})">固定切替</span>` : ''}
                        </div>
                    </div>`);
            });
        });
    }

    document.getElementById('submit-comment').onclick = async () => {
        const user = document.getElementById('com-user').value || "匿名あさぴー";
        const pw = document.getElementById('com-pw').value;
        const text = document.getElementById('com-text').value;
        if(!text || !pw) return alert("内容とパスワードを入れてね！");
        await addDoc(collection(db, "comments"), { postId: currentPostId, user, pw, text, good:0, bad:0, pinned: false, timestamp: serverTimestamp() });
        document.getElementById('com-text').value = "";
    };

    window.react = async (id, type) => { await updateDoc(doc(db, "comments", id), { [type]: increment(1) }); };
    window.togglePin = async (id, s) => { await updateDoc(doc(db, "comments", id), { pinned: !s }); };
    window.deleteComment = async (id, correct) => {
        if(currentUser || prompt("パスワード入力") === correct) await deleteDoc(doc(db, "comments", id));
        else alert("パス不一致");
    };

    window.closeDetail = (e) => { if(e.target.id === 'detail-modal') document.getElementById('detail-modal').style.display = 'none'; };
    document.getElementById('post-btn').onclick = () => alert("管理画面から投稿してね！");
</script>
</body>
</html>
