<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尾張旭魅力発信ブログ｜配布・情報発信</title>
    <style>
        :root { --main-color: #e63946; --bg-color: #f1faee; --text-color: #1d3557; }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding-bottom: 80px; 
            background-image: url('https://soukuun.github.io/owariasahi.miryoku/asapi.png');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: 60%;
        }

        header { background: var(--main-color); color: white; padding: 2rem; text-align: center; position: relative; z-index: 10; }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; position: relative; z-index: 5; }

        /* 記事カードのデザイン */
        .post { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
        }
        .post:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .post.pinned { border-left: 5px solid var(--main-color); }
        
        /* 記事の中身を少し隠す（一覧用） */
        .post-preview {
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; color: #444;
        }

        .badge { background: #a8dadc; color: var(--text-color); padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* 📁 ZIPボタン */
        .zip-download-link {
            display: inline-flex; align-items: center; background: #1d3557; color: white !important;
            padding: 10px 20px; border-radius: 8px; text-decoration: none !important;
            font-weight: bold; margin: 10px 0; font-size: 0.9rem;
        }

        /* 📱 記事詳細用モーダル（全画面表示） */
        #detail-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;
        }
        .detail-content {
            background: white; width: 95%; max-width: 700px; max-height: 85vh;
            border-radius: 15px; padding: 2rem; overflow-y: auto; position: relative;
        }
        .close-detail { position: sticky; top: 0; float: right; font-size: 2rem; cursor: pointer; color: #888; }

        /* 管理用ツール */
        .admin-tools { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        
        #post-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--main-color); color: white; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 500px; }
    </style>
</head>

        <button id="submit-post" style="width:100%; background:var(--main-color); color:white; border:none; padding:10px; border-radius:5px;">保存</button>
    </div>
</div>
